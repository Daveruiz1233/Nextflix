name: Build Nextflix Mobile

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}
          
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Capacitor Sync
        run: npx cap sync android
        
      - name: Build Android APK (Universal)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nextflix-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}
          
      - name: Capacitor Sync
        run: npx cap sync ios
        
      - name: Build iOS App Bundle (Unsigned)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO
                     
      - name: Package IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Debug-iphoneos/App.app Payload/
          zip -r Nextflix-Unsigned.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: nextflix-unsigned.ipa
          path: Nextflix-Unsigned.ipa

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: nextflix-debug.apk
          
      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: nextflix-unsigned.ipa
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Nextflix Shield v1.0.${{ github.run_number }}
          body: |
            ## 🚀 Nextflix Mobile Leap
            This release marks the first stable mobile build of the Nextflix Shield.
            
            ### ✨ Features
            - **Native Shield (iOS/Android)**: Engine-level adblocking that kills redirects inside streaming iframes.
            - **Stealth Service Worker**: Detects and mocks tracking requests.
            - **Premium UI**: Optimized for mobile performance (iPhone 6s Plus).
            
            ### 📦 Artifacts
            - `app-debug.apk`: Universal Android build.
            - `Nextflix-Unsigned.ipa`: Unsigned iOS build for sideloading.
            
            *Note: This is a personal and educational project.*
          files: |
            app-debug.apk
            Nextflix-Unsigned.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
